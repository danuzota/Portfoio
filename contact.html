<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="CSS/reset.css" />
    <link rel="stylesheet" href="CSS/style.css" />
    <title>Contact</title>
  </head>
  <body>
    <div class="container">
      <header class="header common">
        <a href="index.html" class="logo__link"
          ><h1 class="logo__name">Frontend <span>Developer</span></h1></a
        >
        <nav class="header__nav header__nav-common">
          <ul>
            <li><a href="index.html">HOME</a></li>
            <li><a href="projects.html">PROJECTS</a></li>
            <li><a href="skills.html">SKILLS</a></li>
            <li><a href="about.html">ABOUT</a></li>
            <li>
              <a class="nav__link--active" href="#">CONTACT</a>
            </li>
          </ul>
        </nav>

        <button class="menu__icon">
          <div class="menu__icon-line"></div>
        </button>
      </header>

      <main class="contact__main common__main">
        <div class="contact__form common">
          <div class="contact__form-text">
            <h2 class="contact__form-title common__title">
              Let’s build something great together!
            </h2>
            <p class="contact__form-desc">
              Have a project in mind or need a modern website?
            </p>
            <p class="contact__form-desc">
              Feel free to contact me — I’m always open to new opportunities.
            </p>
          </div>

          <form
            action="https://api.web3forms.com/submit"
            method="POST"
            class="contact__form-input"
          >
            <input
              type="hidden"
              name="access_key"
              value="2ad8ee29-ffb0-4c5e-aa58-52ddaa9b50a7"
            />

            <input
              type="text"
              name="name"
              placeholder="Name"
              class="contact__form-name contact__form-common"
            />
            <input
              type="email"
              name="email"
              placeholder="Email"
              class="contact__form-email contact__form-common"
            />
            <textarea
              name="message"
              placeholder="Message"
              class="contact__form-message contact__form-common"
            ></textarea>

            <button type="submit" class="contact__form-btn">
              Send Message
            </button>
          </form>
        </div>
      </main>
    </div>

    <script src="JS/script.js"></script>
  </body>
</html>
